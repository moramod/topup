<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topup & Balance Check Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f4f8; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .status-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .badge { padding: 10px; border-radius: 8px; font-size: 11px; text-align: center; font-weight: bold; border: 1px solid #ddd; }
        .online { background: #e8f8f0; color: #2ecc71; border-color: #2ecc71; }
        .offline { background: #fdeaea; color: #e74c3c; border-color: #e74c3c; }
        .op-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .op-btn { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 10px; background: #f8f9fa; cursor: pointer; font-weight: bold; }
        .selected { border-color: #007bff; color: #007bff; background: #fff; box-shadow: 0 0 5px rgba(0,123,255,0.2); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-fill { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-check { width: 100%; padding: 12px; background: none; border: 1.5px solid #007bff; color: #007bff; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .history { width: 100%; max-width: 400px; margin-top: 25px; }
        .h-item { background: white; padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="card">
    <div class="status-bar">
        <div id="cloud-status" class="badge">Cloud: ...</div>
        <div id="tele-status" class="badge">Telerivet: ...</div>
    </div>

    <div class="op-group">
        <button id="m-btn" class="op-btn" onclick="setOp('Mytel')">Mytel</button>
        <button id="a-btn" class="op-btn" onclick="setOp('ATOM')">ATOM</button>
    </div>

    <input type="tel" id="phone" placeholder="ဖုန်းနံပါတ် (09...)">
    <input type="text" id="pin" placeholder="PIN (ငွေဖြည့်ရန်)">
    
    <button id="mainBtn" class="btn-fill" onclick="sendAction('topup')" disabled>Operator ရွေးပါ</button>
    <button id="checkBtn" class="btn-check" style="display:none;" onclick="sendAction('check')">Balance စစ်မည် (*124#)</button>
</div>

<div class="history">
    <h4 style="margin-left: 5px;">Activity Logs</h4>
    <div id="logs">Loading logs...</div>
</div>

<script>
    let op = "";
    // Firebase Init from google-services.json
    const conf = {
        apiKey: "AIzaSyDahNKp2jaiJSHzNkKw_VtcCR55y9-IHTQ", //
        databaseURL: "https://lovely-7c35f-default-rtdb.asia-southeast1.firebasedatabase.app", //
        projectId: "lovely-7c35f" //
    };

    try {
        firebase.initializeApp(conf);
        const db = firebase.database();
        document.getElementById('cloud-status').innerText = "Cloud: ✅ Online";
        document.getElementById('cloud-status').className = "badge online";

        // History Real-time Listener
        db.ref('logs').limitToLast(10).on('value', s => {
            const logsDiv = document.getElementById('logs');
            logsDiv.innerHTML = "";
            const val = s.val();
            if(val) {
                Object.values(val).reverse().forEach(v => {
                    logsDiv.innerHTML += `<div class="h-item">
                        <div><b>${v.phone}</b><br><small>${v.time}</small></div>
                        <span style="color:${v.action.includes('စစ်')?'#f39c12':'#2ecc71'}">${v.action}</span>
                    </div>`;
                });
            } else { logsDiv.innerHTML = "မှတ်တမ်းမရှိသေးပါ။"; }
        });
    } catch(e) { document.getElementById('cloud-status').innerText = "Cloud: ❌ Offline"; }

    async function checkTele() {
        try {
            const r = await fetch('/api/status');
            const d = await r.json();
            const el = document.getElementById('tele-status');
            if(d.online) { el.innerText = "Telerivet: ✅ Online"; el.className = "badge online"; }
            else { el.innerText = "Telerivet: ❌ Offline"; el.className = "badge offline"; }
        } catch(e) { }
    }

    function setOp(s) {
        op = s;
        document.getElementById('m-btn').className = (op==='Mytel')?'op-btn selected':'op-btn';
        document.getElementById('a-btn').className = (op==='ATOM')?'op-btn selected':'op-btn';
        document.getElementById('mainBtn').disabled = false;
        document.getElementById('mainBtn').innerText = op + " ငွေဖြည့်မည်";
        document.getElementById('checkBtn').style.display = "block"; // Mytel/ATOM နှစ်ခုလုံး *124# သုံးနိုင်သည်
    }

    async function sendAction(type) {
        const phone = document.getElementById('phone').value;
        const pin = document.getElementById('pin').value;
        if(!phone) return alert("ဖုန်းနံပါတ်ထည့်ပါ");

        let ussd = (type==='topup') ? ( (op==='Mytel') ? `*124*${pin}#` : `*123*${pin}#` ) : "*124#";
        
        const res = await fetch('/api/recharge', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ phone, ussd })
        });
        
        const data = await res.json();
        if(data.success) {
            // ငွေစစ်တာရော ငွေဖြည့်တာရော မှတ်တမ်းသွင်းမည်
            firebase.database().ref('logs').push({
                phone,
                action: type==='topup' ? op+' ငွေဖြည့်' : op+' ငွေစစ်',
                time: new Date().toLocaleTimeString()
            });
            alert("အောင်မြင်ပါသည်");
        }
    }

    checkTele(); setInterval(checkTele, 20000);
</script>
</body>
</html>
