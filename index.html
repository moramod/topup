<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-TOPUP PRO - RGB EDITION</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .wave-container { position: fixed; width: 100%; height: 100%; background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000); background-size: 400% 400%; animation: rgbWave 10s ease infinite; z-index: -1; }
        @keyframes rgbWave { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .content-wrapper { display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding-top: 30px; }
        .main-card { background: rgba(18, 18, 18, 0.85); backdrop-filter: blur(15px); border-radius: 25px; padding: 25px; width: 95%; max-width: 420px; border: 1px solid rgba(255, 255, 255, 0.1); color: white; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .status-header { display: flex; justify-content: space-between; background: rgba(255, 255, 255, 0.05); padding: 10px 15px; border-radius: 12px; margin-bottom: 20px; font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.1); }
        .form-control, .form-select { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; border-radius: 10px; margin-bottom: 12px; }
        .btn-main { background: white; color: black; border: none; padding: 12px; border-radius: 12px; font-weight: bold; width: 100%; transition: 0.3s; margin-bottom: 10px; }
        .btn-balance { background: transparent; color: #00f2ff; border: 1px solid #00f2ff; padding: 10px; border-radius: 12px; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-balance:hover { background: rgba(0, 242, 255, 0.1); }
        .status-msg { font-size: 0.85rem; margin-top: 15px; min-height: 20px; font-weight: 500; }
    </style>
</head>
<body>

<div class="wave-container"></div>
<div class="content-wrapper">
    <div class="main-card">
        <div class="status-header">
            <div>Cloud <span id="cloudStatus">⏳</span></div>
            <div>Gateway <span id="gatewayStatus">⏳</span></div>
        </div>
        
        <h4 class="text-center mb-4" style="font-weight: 800; letter-spacing: 2px; text-transform: uppercase;">M-TOPUP PRO</h4>
        
        <select id="simSlot" class="form-select">
            <option value="0">MyTel (Slot 1)</option>
            <option value="1">ATOM (Slot 2)</option>
        </select>
        
        <button onclick="handleUSSD('*124#')" class="btn btn-balance mb-4">CHECK BALANCE (*124#)</button>
        
        <hr style="border-color: rgba(255,255,255,0.1); margin-top: 0;">
        
        <input type="tel" id="phone" class="form-control" placeholder="Phone Number (09...)">
        <input type="text" id="pin" class="form-control" placeholder="Card PIN Number">
        <button onclick="handleTopup()" class="btn btn-main">SUBMIT RECHARGE</button>
        
        <div id="msgBox" class="status-msg text-center"></div>
    </div>
</div>

<script>
    // Live Status Checker
    async function updateStatus() {
        document.getElementById('cloudStatus').innerHTML = navigator.onLine ? "✅" : "❌";
        try {
            const res = await fetch('/api/status');
            const data = await res.json();
            document.getElementById('gatewayStatus').innerHTML = (data.success && data.status === "online") ? "✅" : "❌";
        } catch { document.getElementById('gatewayStatus').innerHTML = "❌"; }
    }
    setInterval(updateStatus, 5000);
    updateStatus();

    // Unified USSD Handler
    async function handleUSSD(ussdCode) {
        const sim = document.getElementById('simSlot').value;
        const msgBox = document.getElementById('msgBox');
        msgBox.innerHTML = "⏳ Sending Request...";
        msgBox.style.color = "#00f2ff";

        try {
            const res = await fetch('/api/ussd', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: ussdCode, simSlot: sim })
            });
            const result = await res.json();
            if(result.success) {
                msgBox.innerHTML = "✅ Success! Check your phone.";
                msgBox.style.color = "#48ff00";
            } else {
                msgBox.innerHTML = "❌ Gateway Busy or Error.";
                msgBox.style.color = "#ff4d4d";
            }
        } catch {
            msgBox.innerHTML = "❌ Server Connection Error.";
            msgBox.style.color = "#ff4d4d";
        }
    }

    function handleTopup() {
        const phone = document.getElementById('phone').value;
        const pin = document.getElementById('pin').value;
        if(!phone || !pin) return alert("Please fill all fields!");
        handleUSSD(`*123*${pin}*${phone}#`);
    }
</script>
</body>
</html>
