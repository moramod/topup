<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-Topup Final Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --mytel: #f39c12; --atom: #00b894; }
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 380px; }
        .status-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .badge { padding: 8px; border-radius: 8px; font-size: 11px; text-align: center; font-weight: bold; border: 1px solid #ddd; }
        .online { background: #e8f8f0; color: #2ecc71; border-color: #2ecc71; }
        .offline { background: #fdeaea; color: #e74c3c; border-color: #e74c3c; }
        .op-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .op-btn { flex: 1; padding: 12px; border: 1.5px solid #ddd; border-radius: 10px; background: #f8f9fa; cursor: pointer; font-weight: bold; }
        .selected-m { border-color: var(--mytel); color: var(--mytel); background: #fffdf5; }
        .selected-a { border-color: var(--atom); color: var(--atom); background: #f0fffb; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-fill { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-check { width: 100%; padding: 10px; background: none; border: 1px solid #666; border-radius: 8px; margin-top: 10px; cursor: pointer; }
        .history { width: 100%; max-width: 380px; margin-top: 25px; }
        .h-item { background: white; padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; font-size: 13px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 4px solid #ddd; }
    </style>
</head>
<body>

<div class="card">
    <div class="status-bar">
        <div id="cloud-status" class="badge">Cloud: ...</div>
        <div id="tele-status" class="badge">Telerivet: ...</div>
    </div>

    <div class="op-group">
        <button id="m-btn" class="op-btn" onclick="setOp('Mytel')">Mytel</button>
        <button id="a-btn" class="op-btn" onclick="setOp('ATOM')">ATOM</button>
    </div>

    <input type="tel" id="phone" placeholder="ဖုန်းနံပါတ် (09...)">
    <input type="text" id="pin" placeholder="PIN (ငွေဖြည့်ရန်)">
    <button id="mainBtn" class="btn-fill" onclick="doAction('topup')" disabled>Operator ရွေးပါ</button>
    <button id="checkBtn" class="btn-check" style="display:none;" onclick="doAction('check')">Balance စစ်မည် (*124#)</button>
</div>

<div class="history">
    <h4>Activity Logs (History)</h4>
    <div id="logs">Loading...</div>
</div>

<script>
    let op = "";
    // Firebase Setup
    const conf = {
        apiKey: "AIzaSyDahNKp2jaiJSHzNkKw_VtcCR55y9-IHTQ", //
        databaseURL: "https://lovely-7c35f-default-rtdb.asia-southeast1.firebasedatabase.app", //
        projectId: "lovely-7c35f" //
    };

    firebase.initializeApp(conf);
    const db = firebase.database();

    // Cloud Status
    db.ref('.info/connected').on('value', s => {
        const el = document.getElementById('cloud-status');
        if(s.val()) { el.innerText = "Cloud: ✅ Online"; el.className = "badge online"; }
        else { el.innerText = "Cloud: ❌ Offline"; el.className = "badge offline"; }
    });

    // History Listener
    db.ref('ussd_history').limitToLast(8).on('value', s => {
        const logs = document.getElementById('logs');
        logs.innerHTML = "";
        const val = s.val();
        if(val) {
            Object.values(val).reverse().forEach(v => {
                logs.innerHTML += `<div class="h-item" style="border-left-color:${v.op==='Mytel'?'#f39c12':'#00b894'}">
                    <div><b>${v.phone}</b><br><small>${v.time}</small></div>
                    <span>${v.type}</span>
                </div>`;
            });
        }
    });

    async function checkTele() {
        try {
            const r = await fetch('/api/status');
            const d = await r.json();
            const el = document.getElementById('tele-status');
            if(d.online) { el.innerText = "Telerivet: ✅ Online"; el.className = "badge online"; }
            else { el.innerText = "Telerivet: ❌ Offline"; el.className = "badge offline"; }
        } catch(e) { }
    }

    function setOp(s) {
        op = s;
        document.getElementById('m-btn').className = (op==='Mytel')?'op-btn selected-m':'op-btn';
        document.getElementById('a-btn').className = (op==='ATOM')?'op-btn selected-a':'op-btn';
        document.getElementById('mainBtn').disabled = false;
        document.getElementById('mainBtn').innerText = op + " ငွေဖြည့်မည်";
        document.getElementById('mainBtn').style.background = (op==='Mytel')?'#f39c12':'#00b894';
        document.getElementById('checkBtn').style.display = "block";
    }

    async function doAction(type) {
        const phone = document.getElementById('phone').value;
        const pin = document.getElementById('pin').value;
        if(!phone) return alert("ဖုန်းနံပါတ်ထည့်ပါ");

        let ussd = (type==='topup') ? (op==='Mytel' ? `*124*${pin}#` : `*123*${pin}#`) : "*124#";
        
        const res = await fetch('/api/recharge', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ phone, ussd })
        });
        const data = await res.json();
        if(data.success) {
            db.ref('ussd_history').push({
                phone, op, type: (type==='topup'?'ငွေဖြည့်':'ငွေစစ်'), time: new Date().toLocaleTimeString()
            });
            alert("အောင်မြင်ပါသည်");
        }
    }
    checkTele(); setInterval(checkTele, 15000);
</script>
</body>
</html>
